<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Selecty</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <p class="subtitle" id="subtitle"></p>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <span class="version">v0.2.0</span>
      </div>
    </header>

    <section class="status-section">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-badge disconnected" id="status-badge">Disconnected</span>
      </div>
      <div class="status-row" id="store-row" style="display:none">
        <span class="status-label">Store</span>
        <span class="status-value" id="store-name"></span>
      </div>
    </section>

    <section class="actions-section">
      <h2>Banners</h2>
      <div class="button-row">
        <button id="btn-export" class="btn btn-export" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span>Export</span>
        </button>
        <button id="btn-import" class="btn btn-import" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Import</span>
        </button>
      </div>
    </section>

    <section class="library-section">
      <h3>Library <span class="count" id="banner-count">0</span></h3>
      <div id="banner-list" class="banner-list">
        <div class="empty-state">No banners saved yet.<br>Visit a store with Selecty and click Export.</div>
      </div>
    </section>
  </div>

  <div class="bg-switcher" id="bg-switcher">
    <label><input type="radio" name="bg" value="none" checked><span class="bg-swatch bg-swatch-none"></span></label>
    <label><input type="radio" name="bg" value="default.jpg"><span class="bg-swatch" style="background-image:url('backgrounds/default.jpg')"></span></label>
    <label><input type="radio" name="bg" value="rm183-techi-02.jpg"><span class="bg-swatch" style="background-image:url('backgrounds/rm183-techi-02.jpg')"></span></label>
    <label><input type="radio" name="bg" value="v859-katie-11.jpg"><span class="bg-swatch" style="background-image:url('backgrounds/v859-katie-11.jpg')"></span></label>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
